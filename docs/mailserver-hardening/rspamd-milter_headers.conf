# /etc/rspamd/local.d/milter_headers.conf
#
# WARNING — SECURITY CRITICAL
# ============================
# The `authentication-results` entry below is what the openclaw-channel-imap
# plugin's auth-gate (requireAuthenticationResults, dropOnDkimFail,
# dropOnSpfFail, dropOnDmarcFail) reads. If it is removed or disabled,
# inbound mail will reach the plugin with `dkim=none, spf=none, dmarc=none`
# and fail closed — but removal is also an availability hole because
# *all* inbound mail to the watched mailbox will be dropped.
#
# Keep `use = ["authentication-results", ...]` on every milter pass.

# Required presets — adds Authentication-Results on every inbound.
use = [
  "authentication-results",
  "x-spamd-result",
  "x-rspamd-server",
  "x-rspamd-queue-id",
  "remove-headers",  # strips any attacker-supplied upstream Authentication-Results
];

# Explicitly strip attacker-supplied Authentication-Results headers
# *before* rspamd writes its own. Without this, a sender can attach a
# fake `Authentication-Results: ...; dkim=pass` and the plugin will read
# the *first* matching header if rspamd appends rather than replaces.
routines {
  remove-headers {
    headers = {
      "Authentication-Results" = 0;  # 0 = remove ALL instances
      "X-Spamd-Result" = 0;
    };
  }
  authentication-results {
    # Use this exact hostname in the header so receivers can identify
    # *who* made the verdict. Attacker-forged Authentication-Results
    # using a different authserv-id are rejected at the plugin level
    # by stripping them above.
    authserv_id = "mail.antarien.com";
    add_smtp_user = false;
  }
}

# Milter must always add the header on accept. Reject should still drop
# the mail at SMTP, but if it is ever changed to deliver-with-spam-flag,
# the plugin still needs the header to evaluate it.
